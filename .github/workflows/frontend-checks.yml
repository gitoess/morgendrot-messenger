# Messenger Next-App: ESLint (Feature-Grenzen), Typecheck, Vitest
name: Frontend checks

on:
  push:
    paths:
      - 'frontend/**'
      - 'src/shared/**'
      - 'packages/morgendrot-core/**'
      - '.github/workflows/frontend-checks.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'src/shared/**'
      - 'packages/morgendrot-core/**'
      - '.github/workflows/frontend-checks.yml'

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: "@morgendrot/core unit tests"
        working-directory: packages/morgendrot-core
        run: npm ci && npm run test:unit

      - run: npm run lint

      - run: npm run check:circular

      - run: npx tsc --noEmit

      - run: npm run test:unit
