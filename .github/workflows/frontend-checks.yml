# Messenger Next-App: ESLint (Feature-Grenzen), Typecheck, Vitest
name: Frontend checks

on:
  push:
    paths:
      - 'frontend/**'
      - 'src/shared/**'
      - 'packages/morgendrot-core/**'
      - '.github/workflows/frontend-checks.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'src/shared/**'
      - 'packages/morgendrot-core/**'
      - '.github/workflows/frontend-checks.yml'

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: "@morgendrot/core unit tests"
        working-directory: packages/morgendrot-core
        env:
          CI: 'true'
        run: npm ci && npm run test:unit

      - run: npm run lint

      - run: npm run check:circular

      - run: npx tsc --noEmit

      - name: Frontend Vitest (jsdom)
        env:
          CI: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          set +e
          npx vitest run --project frontend-jsdom \
            --reporter=default --reporter=github-actions \
            --reporter=json --outputFile=vitest-jsdom-report.json
          rc=$?
          if [ "$rc" -ne 0 ]; then
            if node scripts/vitest-jsdom-teardown-flake-guard.mjs vitest-jsdom-report.json; then
              exit 0
            fi
            echo "::warning::jsdom Vitest failed (exit $rc) — one retry with JSON report (Linux teardown flake)"
            npx vitest run --project frontend-jsdom \
              --reporter=default --reporter=github-actions \
              --reporter=json --outputFile=vitest-jsdom-retry.json
            rc=$?
            if [ "$rc" -ne 0 ]; then
              node scripts/vitest-jsdom-teardown-flake-guard.mjs vitest-jsdom-retry.json && exit 0
            fi
          fi
          exit $rc

      - name: Frontend Vitest (node)
        env:
          CI: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npx vitest run --project frontend-node

      - name: Next build (Morgendrot Projekt)
        run: npm run build

      - name: Next build (Morgendrot Messenger)
        run: npm run build:messenger
